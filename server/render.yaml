# render.yaml — Luminexis Finance Backend
# Docs: https://render.com/docs/blueprint-spec
#
# HOW TO DEPLOY:
# 1. Push this file to your GitHub repo (server/ directory)
# 2. Go to https://dashboard.render.com → New → Blueprint
# 3. Connect your GitHub repo → Render will detect this file
# 4. Set the environment variables marked "sync: false" in the Render dashboard
#
# REQUIRED env vars to set in Render dashboard:
#   DATABASE_URL      → your Neon PostgreSQL connection string
#   JWT_ACCESS_SECRET → random string, min 32 chars
#   JWT_REFRESH_SECRET → random string, min 32 chars
#   CLIENT_URL         → https://luminexis-finance.vercel.app

services:
  - type: web
    name: luminexis-api
    runtime: node
    region: oregon  # Change to: singapore, frankfurt, ohio as needed
    plan: free      # Upgrade to starter ($7/mo) for always-on
    rootDir: server
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4000

      - key: LOG_LEVEL
        value: info

      # JWT secrets — set these in Render dashboard (never commit real values)
      - key: JWT_ACCESS_SECRET
        sync: false

      - key: JWT_REFRESH_SECRET
        sync: false

      - key: JWT_ACCESS_EXPIRES
        value: 15m

      - key: JWT_REFRESH_EXPIRES
        value: 7d

      # PostgreSQL connection string from Neon / Supabase / Railway
      # Format: postgresql://user:password@host/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false

      # Your Vercel frontend URL — used for CORS
      - key: CLIENT_URL
        value: https://luminexis-finance.vercel.app

      - key: FRONTEND_URL
        value: https://luminexis-finance.vercel.app
